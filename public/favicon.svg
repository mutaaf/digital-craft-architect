<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#33C3F0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#33C3F0" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle brain silhouette (centered, behind text) -->
  <g transform="translate(256, 240)" fill="url(#brainGrad)">
    <!-- Left hemisphere -->
    <path d="M-8,-120 C-50,-118 -85,-100 -105,-72 C-125,-44 -130,-8 -125,20 C-138,12 -155,18 -162,38 C-169,58 -160,80 -142,90 C-148,108 -140,130 -122,142 C-104,154 -80,152 -64,140 C-56,160 -36,174 -14,174 C-4,174 -8,174 -8,174 L-8,-120Z"/>
    <!-- Right hemisphere -->
    <path d="M8,-120 C50,-118 85,-100 105,-72 C125,-44 130,-8 125,20 C138,12 155,18 162,38 C169,58 160,80 142,90 C148,108 140,130 122,142 C104,154 80,152 64,140 C56,160 36,174 14,174 C4,174 8,174 8,174 L8,-120Z"/>
    <!-- Brain stem -->
    <path d="M-14,174 C-14,195 -8,210 0,220 C8,210 14,195 14,174 L-14,174Z"/>
    <!-- Center fissure -->
    <path d="M0,-118 C-2,-60 2,0 -2,60 C0,100 2,140 0,174" stroke="#0f172a" stroke-width="3" fill="none" stroke-opacity="0.3"/>
    <!-- Subtle folds left -->
    <path d="M-30,-80 C-60,-70 -90,-40 -100,-10" stroke="#0f172a" stroke-width="2" fill="none" stroke-opacity="0.15"/>
    <path d="M-25,-20 C-55,-10 -95,10 -115,40" stroke="#0f172a" stroke-width="2" fill="none" stroke-opacity="0.15"/>
    <path d="M-20,50 C-50,60 -85,80 -105,110" stroke="#0f172a" stroke-width="2" fill="none" stroke-opacity="0.15"/>
    <!-- Subtle folds right -->
    <path d="M30,-80 C60,-70 90,-40 100,-10" stroke="#0f172a" stroke-width="2" fill="none" stroke-opacity="0.15"/>
    <path d="M25,-20 C55,-10 95,10 115,40" stroke="#0f172a" stroke-width="2" fill="none" stroke-opacity="0.15"/>
    <path d="M20,50 C50,60 85,80 105,110" stroke="#0f172a" stroke-width="2" fill="none" stroke-opacity="0.15"/>
  </g>

  <!-- "D" letter -->
  <text x="156" y="320" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif" font-size="260" font-weight="700" fill="white" letter-spacing="-8">D</text>

  <!-- "C" letter in skyblue -->
  <text x="310" y="320" font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif" font-size="260" font-weight="700" fill="#33C3F0" letter-spacing="-8">C</text>
</svg>
